<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Inter,sans-serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#211a11"/>
      <stop offset="100%" stop-color="#191410"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#2a2318" opacity="0.55"/>
    </pattern>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a52222" flood-opacity="0.55"/>
    </filter>
    <filter id="wireGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#c9a25f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="18" fill="#14110d"/>
  <rect width="1200" height="560" rx="18" fill="url(#dots)"/>
  <rect x="0.5" y="0.5" width="1199" height="559" rx="17.5" stroke="#33291a"/>

  <!-- fios de chakra -->
  <g stroke="#c9a25f" stroke-width="2" opacity="0.6" fill="none" filter="url(#wireGlow)">
    <path d="M 348 250 C 400 250, 400 170, 452 170"/>
    <path d="M 762 170 C 812 170, 812 300, 862 300"/>
    <path d="M 762 452 C 830 452, 800 330, 862 318"/>
  </g>
  <circle cx="400" cy="210" r="4" fill="#f4e4c0" filter="url(#wireGlow)"/>
  <circle cx="812" cy="235" r="4" fill="#f4e4c0" filter="url(#wireGlow)"/>

  <!-- ═ nó: tarefa inicial ═ -->
  <g>
    <rect x="48" y="152" width="300" height="196" rx="16" fill="url(#card)" stroke="#3a3020"/>
    <path d="M 64 153.5 H 332" stroke="#4a7c59" stroke-width="3"/>
    <circle cx="72" cy="182" r="4" fill="#4a7c59"/>
    <text x="86" y="187" font-size="15" font-weight="700" fill="#e8dcc4">tarefa inicial</text>
    <rect x="66" y="202" width="264" height="126" rx="10" fill="#14110d" stroke="#33291a"/>
    <text x="80" y="232" font-size="13" fill="#e8dcc4">Refazer a landing page e criar</text>
    <text x="80" y="252" font-size="13" fill="#e8dcc4">os testes do formulário</text>
    <circle cx="348" cy="250" r="7" fill="#c9a25f"/>
  </g>

  <!-- ═ nó: agente Sasori (rodando) ═ -->
  <g filter="url(#glowRed)">
    <rect x="452" y="72" width="310" height="196" rx="16" fill="url(#card)" stroke="#a52222"/>
  </g>
  <path d="M 468 73.5 H 746" stroke="#a52222" stroke-width="3"/>
  <circle cx="476" cy="102" r="4" fill="#c9a25f"/>
  <text x="490" y="107" font-size="15" font-weight="700" fill="#e8dcc4">Sasori</text>
  <circle cx="676" cy="102" r="5" fill="#c9a25f"/>
  <text x="688" y="106" font-size="11" fill="#8a7c5e">editando arquivos</text>
  <rect x="470" y="120" width="92" height="22" rx="6" fill="#14110d"/>
  <text x="516" y="135" font-size="11" font-weight="600" fill="#8a7c5e" text-anchor="middle">Claude Code</text>
  <rect x="570" y="120" width="76" height="22" rx="6" fill="#14110d"/>
  <text x="608" y="135" font-size="11" fill="#8a7c5e" text-anchor="middle">apps/web</text>
  <text x="472" y="172" font-size="12.5" fill="#b8a877">Você reconstrói a landing com</text>
  <text x="472" y="192" font-size="12.5" fill="#b8a877">Tailwind, componentes limpos e</text>
  <text x="472" y="212" font-size="12.5" fill="#b8a877">acessibilidade.</text>
  <circle cx="452" cy="170" r="7" fill="#14110d" stroke="#c9a25f" stroke-width="2"/>
  <circle cx="762" cy="170" r="7" fill="#c9a25f"/>

  <!-- ═ nó: tarefas de humano ═ -->
  <g>
    <rect x="452" y="330" width="310" height="188" rx="16" fill="url(#card)" stroke="#3a3020"/>
    <path d="M 468 331.5 H 746" stroke="#f4e4c0" stroke-width="3"/>
    <text x="472" y="364" font-size="15" font-weight="700" fill="#e8dcc4">🙋 tarefas de humano</text>
    <circle cx="676" cy="359" r="5" fill="#3a3020"/>
    <text x="688" y="363" font-size="11" fill="#8a7c5e">aguardando</text>
    <rect x="468" y="378" width="278" height="122" rx="10" fill="#14110d" stroke="#33291a"/>
    <!-- item feito -->
    <rect x="482" y="392" width="16" height="16" rx="4" fill="#1c2b20" stroke="#4a7c59"/>
    <path d="M 486 400 l 3 3 l 6 -6" stroke="#4a7c59" stroke-width="2" fill="none"/>
    <text x="508" y="405" font-size="12.5" fill="#5f5540" text-decoration="line-through">pegar a API key no painel</text>
    <path d="M 482 414 H 732" stroke="#221c12"/>
    <!-- item pendente -->
    <rect x="482" y="424" width="16" height="16" rx="4" fill="#14110d" stroke="#3a3020"/>
    <text x="508" y="437" font-size="12.5" fill="#e8dcc4">aprovar o acesso no Slack</text>
    <path d="M 482 446 H 732" stroke="#221c12"/>
    <text x="482" y="472" font-size="12.5" fill="#5f5540">+  adicionar tarefa…</text>
    <circle cx="452" cy="452" r="7" fill="#14110d" stroke="#c9a25f" stroke-width="2"/>
    <circle cx="762" cy="452" r="7" fill="#c9a25f"/>
  </g>

  <!-- ═ nó: resultado final ═ -->
  <g>
    <rect x="862" y="220" width="300" height="180" rx="16" fill="url(#card)" stroke="#3a3020"/>
    <path d="M 878 221.5 H 1146" stroke="#c9a25f" stroke-width="3"/>
    <circle cx="886" cy="250" r="4" fill="#c9a25f"/>
    <text x="900" y="255" font-size="15" font-weight="700" fill="#e8dcc4">resultado final</text>
    <rect x="880" y="270" width="264" height="112" rx="10" fill="#14110d"/>
    <text x="894" y="298" font-size="12.5" font-style="italic" fill="#5f5540">o resumo de tudo que as</text>
    <text x="894" y="318" font-size="12.5" font-style="italic" fill="#5f5540">marionetes fizeram aparece aqui</text>
    <circle cx="862" cy="310" r="7" fill="#14110d" stroke="#c9a25f" stroke-width="2"/>
  </g>

  <!-- badge branch -->
  <rect x="48" y="40" width="360" height="34" rx="9" fill="#1b160f" stroke="#33291a"/>
  <text x="64" y="62" font-size="12.5" fill="#8a7c5e">⎇  clone invocado: </text>
  <text x="182" y="62" font-size="12.5" font-weight="600" fill="#c9a25f">marionette/refazer-landing</text>

  <!-- dica -->
  <rect x="420" y="524" width="360" height="26" rx="13" fill="#1b160fcc" stroke="#2a2318"/>
  <text x="600" y="541" font-size="11" fill="#6a5e46" text-anchor="middle">arraste os nós · puxe um fio da bolinha direita até outro nó</text>
</svg>
